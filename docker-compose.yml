services:
  db:
    image: postgis/postgis:17-3.4
    container_name: estratos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: estratos_dev
    ports:
      - "5432:5432"
    volumes:
      - estratos_db_data:/var/lib/postgresql/data

volumes:
  estratos_db_data:
